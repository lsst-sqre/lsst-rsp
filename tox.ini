[tox]
envlist = py,coverage-report,typing,lint
isolated_build = True

[testenv]
description = Run pytest against {envname}.
runner = uv-venv-lock-runner

[testenv:coverage-report]
description = Compile coverage from each test run.
commands = coverage report
package = skip

[testenv:docs]
description = Build documentation (HTML) with Sphinx.
allowlist_externals =
    rm
commands =
    rm -rf docs/api
    sphinx-build -W --keep-going -n -T -b html -d {envtmpdir}/doctrees docs docs/_build/html
dependency_groups =
    dev
    docs

[testenv:docs-linkcheck]
description = Check links in the documentation.
allowlist_externals =
    make
commands =
    make linkcheck
dependency_groups =
    dev
    docs

[testenv:lint]
description = Lint codebase by running pre-commit.
commands = prek run --all-files
package = skip
uv_sync_flags = --only-group, lint

[testenv:py]
description = Run pytest
commands =
    pytest --cov=lsst.rsp --cov-branch --cov-report= {posargs}

[testenv:typing]
description = Run mypy.
commands =
    mypy src/lsst tests
package = skip
dependency_groups =
    dev
    typing
